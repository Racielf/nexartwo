name: Production Investor Hub Repair

# -------------------------------------------------------
# SCOPE:
# Manual-only production repair for the missing capital_calls table.
# This does NOT run supabase db push and does NOT alter migration history.
# It applies only supabase/migrations/202605170001_repair_capital_calls.sql
# through psql, then runs rollback-based smoke tests.
# -------------------------------------------------------

on:
  workflow_dispatch:

jobs:
  repair-capital-calls:
    name: "Repair production Investor Hub capital_calls"
    runs-on: ubuntu-latest

    steps:
      - name: "STEP 1 - Checkout repo"
        uses: actions/checkout@v4

      - name: "STEP 2 - Install PostgreSQL client"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          echo "STEP 2 PASS: psql installed"

      - name: "STEP 3 - Apply capital_calls repair SQL"
        run: |
          echo "=== PRODUCTION REPAIR ==="
          echo "Applying only: supabase/migrations/202605170001_repair_capital_calls.sql"
          echo "No db push. No project financial tables touched."
          echo "========================="
          export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          psql \
            -h aws-1-us-east-1.pooler.supabase.com \
            -p 5432 \
            -U "postgres.${SUPABASE_PROJECT_REF}" \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -f supabase/migrations/202605170001_repair_capital_calls.sql
          echo "STEP 3 PASS: repair SQL applied"
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: "STEP 4 - Verify Investor Hub tables exist"
        run: |
          export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          TABLE_COUNT=$(psql \
            -h aws-1-us-east-1.pooler.supabase.com \
            -p 5432 \
            -U "postgres.${SUPABASE_PROJECT_REF}" \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -t -A \
            -c "SELECT COUNT(*) FROM information_schema.tables
                WHERE table_schema = 'public'
                  AND table_name IN (
                    'investor_companies',
                    'investors',
                    'project_investors',
                    'capital_contributions',
                    'capital_calls'
                  );")

          echo "Phase 2B tables found: ${TABLE_COUNT} / 5"
          if [ "${TABLE_COUNT}" != "5" ]; then
            echo "::error::Expected 5 Investor Hub tables, found ${TABLE_COUNT}."
            exit 1
          fi
          echo "STEP 4 PASS: all Investor Hub tables exist"
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: "STEP 5 - Run Investor Hub smoke test with rollback"
        run: |
          export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          if ! psql \
            -h aws-1-us-east-1.pooler.supabase.com \
            -p 5432 \
            -U "postgres.${SUPABASE_PROJECT_REF}" \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -f qa/investor_hub_smoke_test.sql \
            -A -t > qa_investor_output.txt 2>&1; then
            echo "::error::Investor Hub smoke test failed"
            cat qa_investor_output.txt
            exit 1
          fi

          cat qa_investor_output.txt
          if ! grep -q "ALL SMOKE TESTS PASSED" qa_investor_output.txt; then
            echo "::error::Investor Hub smoke test did not reach success marker."
            exit 1
          fi
          echo "STEP 5 PASS: Investor Hub smoke test passed and rolled back"
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: "STEP 6 - Run Phase 1 financial smoke test with rollback"
        run: |
          export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          if ! psql \
            -h aws-1-us-east-1.pooler.supabase.com \
            -p 5432 \
            -U "postgres.${SUPABASE_PROJECT_REF}" \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -f qa/financial_system_smoke_test.sql \
            -A -t > qa_financial_output.txt 2>&1; then
            echo "::error::Phase 1 financial smoke test failed"
            cat qa_financial_output.txt
            exit 1
          fi

          cat qa_financial_output.txt
          if grep -q "FAIL" qa_financial_output.txt; then
            echo "::error::Phase 1 financial smoke test has failing assertions."
            exit 1
          fi
          echo "STEP 6 PASS: Phase 1 financial smoke test passed"
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: "STEP 7 - Final summary"
        if: success()
        run: |
          echo "=================================================="
          echo "  PRODUCTION INVESTOR HUB REPAIR PASSED"
          echo "=================================================="
          echo "  capital_calls table:          PRESENT"
          echo "  5 Investor Hub tables:        PRESENT"
          echo "  Investor Hub smoke test:      PASS"
          echo "  Phase 1 financial smoke test: PASS"
          echo "  Test writes persisted:        NO (rollback)"
          echo "=================================================="
