name: Supabase Financial QA

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run DB Push
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Smoke Test via psql
        id: smoke_test
        run: |
          set -e
          # Use standard PostgreSQL client to execute the smoke test against the remote DB
          export PGPASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}"
          
          # We format output to be aligned and grep for any FAILs
          psql -h aws-1-us-east-1.pooler.supabase.com -p 5432 -U postgres.${{ secrets.SUPABASE_PROJECT_REF }} -d postgres -v ON_ERROR_STOP=1 -f qa/financial_system_smoke_test.sql -A -t > qa_output.txt
          
          echo "==== QA SMOKE TEST RESULTS ===="
          cat qa_output.txt
          echo "==============================="
          
          if grep -q "FAIL" qa_output.txt; then
            echo "::error::Smoke test failed! One or more assertions returned FAIL."
            exit 1
          else
            echo "All tests PASSED!"
          fi
