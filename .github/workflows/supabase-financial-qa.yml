name: Supabase Financial QA

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Apply Investor Hub capital_calls repair only
        run: |
          echo "Applying only supabase/migrations/202605170001_repair_capital_calls.sql"
          echo "No supabase db push. No migration history changes."
          export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          psql \
            -h aws-1-us-east-1.pooler.supabase.com \
            -p 5432 \
            -U "postgres.${SUPABASE_PROJECT_REF}" \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -f supabase/migrations/202605170001_repair_capital_calls.sql
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify Investor Hub tables
        run: |
          export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          TABLE_COUNT=$(psql \
            -h aws-1-us-east-1.pooler.supabase.com \
            -p 5432 \
            -U "postgres.${SUPABASE_PROJECT_REF}" \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -t -A \
            -c "SELECT COUNT(*) FROM information_schema.tables
                WHERE table_schema = 'public'
                  AND table_name IN (
                    'investor_companies',
                    'investors',
                    'project_investors',
                    'capital_contributions',
                    'capital_calls'
                  );")
          echo "Investor Hub tables found: ${TABLE_COUNT} / 5"
          if [ "${TABLE_COUNT}" != "5" ]; then
            echo "::error::Expected 5 Investor Hub tables, found ${TABLE_COUNT}."
            exit 1
          fi
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Run Investor Hub smoke test via psql
        run: |
          export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          if ! psql \
            -h aws-1-us-east-1.pooler.supabase.com \
            -p 5432 \
            -U "postgres.${SUPABASE_PROJECT_REF}" \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -f qa/investor_hub_smoke_test.sql \
            -A -t > qa_investor_output.txt 2>&1; then
            echo "::error::Investor Hub smoke test failed."
            cat qa_investor_output.txt
            exit 1
          fi

          cat qa_investor_output.txt
          if ! grep -q "ALL SMOKE TESTS PASSED" qa_investor_output.txt; then
            echo "::error::Investor Hub smoke test did not reach success marker."
            exit 1
          fi
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Run financial smoke test via psql
        run: |
          export PGPASSWORD="${SUPABASE_DB_PASSWORD}"
          if ! psql \
            -h aws-1-us-east-1.pooler.supabase.com \
            -p 5432 \
            -U "postgres.${SUPABASE_PROJECT_REF}" \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -f qa/financial_system_smoke_test.sql \
            -A -t > qa_financial_output.txt 2>&1; then
            echo "::error::Financial smoke test failed."
            cat qa_financial_output.txt
            exit 1
          fi

          cat qa_financial_output.txt
          if grep -q "FAIL" qa_financial_output.txt; then
            echo "::error::Financial smoke test has failing assertions."
            exit 1
          fi
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
